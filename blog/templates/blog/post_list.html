<!DOCTYPE html>
<html>
    <head>
        <title>CK's blog</title>
    </head>
    <body>
        <header>
            <h1><a href="/">CK's blog</a></h1>
        </header>

        {% for post in posts %}
            <article>
                <time>published: {{post.published_date }}</time>
                <h2><a href="">{{ post.title  }}</a></h2>
                <p>{{ post.text|linebreaksbr }}</p>
            </article>
        {% endfor %}
        
        <article>
            <time>published: 19.06.2026, 21:43</time>
            <h2><a href="">My second post</a></h2>
            <p>Hi there!</p>
        </article>
    </body>
</html>
